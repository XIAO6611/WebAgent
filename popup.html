<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; }
    textarea { width: 100%; height: 60px; resize: none; margin-bottom: 10px; padding: 8px; box-sizing: border-box;}
    button { width: 100%; padding: 10px; background: #1890ff; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;}
    button:hover { background: #40a9ff; }
    .btn-options { background: #f0f0f0; color: #333; margin-top: 10px; }
    .btn-options:hover { background: #e0e0e0; }
    #logBox { margin-top: 15px; padding: 10px; background: #282c34; color: #abb2bf; border-radius: 4px; height: 120px; overflow-y: auto; font-size: 12px; font-family: monospace; }
  </style>
</head>
<body>
  <h3 style="margin-top: 0;">🤖 Web Agent</h3>
  
  <textarea id="taskInput" placeholder="输入指令，例如：收集考研信息"></textarea>
  <button id="startBtn">▶ 开始执行</button>
  <button id="optionsBtn" class="btn-options">⚙️ 去配置 API 和知识库</button>

  <div id="logBox">> 系统就绪...<br></div>

  <script src="popup.js"></script>
</body>
</html>
